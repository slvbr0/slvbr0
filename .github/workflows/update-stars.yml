name: Update Starred Repositories

on:
  schedule:
    - cron: '0 0 * * *'   # daily at midnight UTC
  workflow_dispatch:

jobs:
  update-stars:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch starred repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api user/starred --paginate \
            | jq -r '.[] | [
                .full_name,
                (.description // ""),
                (.language // ""),
                (.stargazers_count | tostring),
                ((.topics // []) | join(","))
              ] | @tsv' \
            > /tmp/stars.tsv
          # Abort if nothing was returned (API error or genuinely empty list)
          if [ ! -s /tmp/stars.tsv ]; then
            echo "No starred repositories found or API call failed — skipping README update."
            exit 1
          fi

      - name: Update README
        run: |
          python3 - <<'PYEOF'
          import re

          rows = []
          with open("/tmp/stars.tsv") as f:
              for line in f:
                  parts = line.rstrip("\n").split("\t")
                  # pad to 5 fields in case trailing empty fields were stripped
                  parts += [""] * (5 - len(parts))
                  full_name, description, language, stars, topics_raw = parts[:5]
                  topics = [t for t in topics_raw.split(",") if t]

                  badges = ""
                  if language:
                      badges += f" `{language}`"
                  if stars:
                      badges += f" ⭐ {stars}"
                  if topics:
                      badges += " · " + " ".join(f"`{t}`" for t in topics)

                  entry = f"**[{full_name}](https://github.com/{full_name})**{badges}"
                  if description:
                      entry += f"  \n  {description}"
                  rows.append(entry)

          md_list = "\n\n".join(rows)

          with open("README.md") as f:
              content = f.read()

          new_block = "<!-- STARS_START -->\n" + md_list + "\n<!-- STARS_END -->"
          content = re.sub(
              r"<!-- STARS_START -->.*?<!-- STARS_END -->",
              new_block,
              content,
              flags=re.DOTALL,
          )

          with open("README.md", "w") as f:
              f.write(content)
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update starred repositories list" && git push || true
